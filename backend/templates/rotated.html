<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Rotated — KeyRotate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --blue:#1d3a8a; --ink:#1a1a1a; --muted:#666; --bg:#f8f5ef; --card:#fffdf8; --border:#e6e0d3; --terracotta:#c75d3a; }
    html, body { margin:0; padding:0; background:var(--bg); color:var(--ink); font-family:Inter,system-ui,sans-serif; }
    .wrap { max-width:560px; margin:8vh auto; padding:0 24px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:40px; text-align:center; }
    h1 { font-family:'Cormorant Garamond',Georgia,serif; font-weight:600; font-size:40px; margin:0 0 12px; color:var(--blue); letter-spacing:-0.5px; }
    p { color:var(--muted); font-size:16px; line-height:1.6; }
    .key { color:var(--ink); font-weight:500; }
    a { display:inline-block; margin-top:24px; padding:12px 24px; background:var(--terracotta); color:#fff; text-decoration:none; border-radius:8px; font-weight:500; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>✓ Done</h1>
      <p><span class="key">{{ key.name }}</span> is now set to expire on <strong>{{ key.expires_at }}</strong>.</p>
      <a href="{{ app_base_url }}">Back to dashboard</a>
    </div>
  </div>
</body>
</html>
